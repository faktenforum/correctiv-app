# Builds a signed Android APK + AAB and attaches them to a GitHub Release.
#
# Trigger: push a version tag, e.g.
#     git tag v1.2.3 && git push origin v1.2.3
# The release (with auto-generated notes) is created automatically and the
# APK/AAB are attached as downloadable assets.
#
# Manual runs (workflow_dispatch) build the artifacts and upload them to the
# run only (no release is created) — useful for testing the pipeline.
#
# Signing:
#   - If the ANDROID_KEYSTORE_* secrets are set (see docs/release.md), the build
#     is signed with your real upload key -> Play-ready APK + AAB.
#   - If they are NOT set, it falls back to the committed throwaway TEST keystore
#     (signing/correctiv-test.keystore) -> installable test APK only (no AAB).
#     Never use the test key for the Play Store.
# Optional secrets:
#   ANDROID_KEYSTORE_BASE64   base64 of the upload keystore (.jks)
#   ANDROID_KEYSTORE_PASSWORD keystore password
#   ANDROID_KEY_ALIAS         key alias
#   ANDROID_KEY_PASSWORD      key (alias) password
name: Release Android

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write # required to create the release and upload assets

concurrency:
  group: release-android-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build signed APK + AAB
    runs-on: ubuntu-latest
    # Skip the NativeScript doctor preflight (no emulator on a build runner);
    # the actual compilation toolchain is validated by the build itself.
    env:
      NS_SKIP_ENV_CHECK: "true"
      # @nativescript/vite 2.0.3 only deploys the Vite bundle into the native
      # project in watch mode (ns debug, via an IPC channel). A one-shot
      # `ns build` has no IPC, so the bundle never reaches assets/app and the
      # Static Binding Generator fails. Point Vite's output dir straight at the
      # platform assets dir so the bundle lands where the build expects it.
      NS_VITE_DIST_DIR: ${{ github.workspace }}/platforms/android/app/src/main/assets/app
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Prepare Android SDK
        run: |
          SDKMANAGER="${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager"
          yes | "$SDKMANAGER" --licenses >/dev/null 2>&1 || true
          "$SDKMANAGER" "platform-tools" "platforms;android-35" "build-tools;35.0.0" >/dev/null || true

      - name: Install dependencies
        run: npm ci

      - name: Install NativeScript CLI
        run: npm install -g nativescript

      # Pick the signing key: real upload keystore from secrets (Play-ready) or
      # the committed throwaway TEST keystore (installable test APK only).
      - name: Prepare keystore
        id: ks
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "Signing with the real upload keystore (from secrets)."
            echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "${RUNNER_TEMP}/release.keystore"
            echo "path=${RUNNER_TEMP}/release.keystore" >> "$GITHUB_OUTPUT"
            echo "real=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::No ANDROID_KEYSTORE_* secrets set — signing with the committed TEST keystore. The result is NOT for the Play Store."
            echo "path=${GITHUB_WORKSPACE}/signing/correctiv-test.keystore" >> "$GITHUB_OUTPUT"
            echo "real=false" >> "$GITHUB_OUTPUT"
          fi

      # On a tag, drive the app version from the tag (vX.Y.Z -> X.Y.Z) and use
      # the run number as a monotonic versionCode (Play Store requires it to
      # increase on every upload). Skipped on manual runs.
      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          VERSION_NAME="${GITHUB_REF_NAME#v}"
          VERSION_CODE="${GITHUB_RUN_NUMBER}"
          echo "versionName=$VERSION_NAME versionCode=$VERSION_CODE"
          sed -i -E "s/versionName \"[^\"]*\"/versionName \"${VERSION_NAME}\"/" App_Resources/Android/app.gradle
          sed -i -E "s/versionCode [0-9]+/versionCode ${VERSION_CODE}/" App_Resources/Android/app.gradle

      # Passwords/alias fall back to the TEST keystore's known values when the
      # secrets are absent (GitHub returns '' for an unset secret).
      - name: Build signed APK
        env:
          KS_PATH: ${{ steps.ks.outputs.path }}
          KS_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD || 'correctiv-test' }}
          KS_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS || 'correctiv-test' }}
          KS_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD || 'correctiv-test' }}
        run: |
          ns build android --release \
            --key-store-path "$KS_PATH" \
            --key-store-password "$KS_PASSWORD" \
            --key-store-alias "$KS_ALIAS" \
            --key-store-alias-password "$KS_KEY_PASSWORD"

      # The AAB is only useful for the Play Store, so build it for real releases
      # only (skipped on the TEST-keystore fallback).
      - name: Build signed AAB (Play Store)
        if: steps.ks.outputs.real == 'true'
        env:
          KS_PATH: ${{ steps.ks.outputs.path }}
          KS_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KS_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KS_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          ns build android --release --aab \
            --key-store-path "$KS_PATH" \
            --key-store-password "$KS_PASSWORD" \
            --key-store-alias "$KS_ALIAS" \
            --key-store-alias-password "$KS_KEY_PASSWORD"

      - name: SBG diagnostics on failure
        if: failure()
        run: |
          echo "=== which node / version ==="; which node; node --version
          echo "=== runSbg.log ==="
          cat platforms/android/build-tools/runSbg.log 2>/dev/null || echo "(no runSbg.log found)"
          echo "=== js_parser verbose (enableErrorLogging) ==="
          node platforms/android/build-tools/jsparser/js_parser.js enableErrorLogging 2>&1 | tail -60 || true

      # Collect from the stable Gradle output paths and give them a versioned
      # name. ref_name is the tag on tag runs, the branch on manual runs.
      - name: Collect artifacts
        run: |
          mkdir -p dist
          NAME="correctiv-app-${GITHUB_REF_NAME}"
          cp platforms/android/app/build/outputs/apk/release/*.apk "dist/${NAME}.apk"
          # AAB only exists for real releases; ignore if absent (TEST fallback).
          cp platforms/android/app/build/outputs/bundle/release/*.aab "dist/${NAME}.aab" 2>/dev/null || true
          ls -lh dist

      - name: Upload artifacts to the run
        uses: actions/upload-artifact@v4
        with:
          name: android-release-${{ github.ref_name }}
          path: dist/*
          if-no-files-found: error
          retention-days: 30

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        # Pinned to a full commit SHA (supply-chain hardening for this
        # third-party action, which runs with contents: write).
        # Bump deliberately; check https://github.com/softprops/action-gh-release/releases
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          files: |
            dist/*.apk
            dist/*.aab
          # In the TEST-keystore fallback there is no AAB, so don't fail on it.
          fail_on_unmatched_files: false
          generate_release_notes: true
          append_body: true
          body: "${{ steps.ks.outputs.real == 'true' && '' || '> ⚠️ **Test build** — signed with the in-repo test key, **not** for the Play Store. For sideloading/testing only.' }}"
