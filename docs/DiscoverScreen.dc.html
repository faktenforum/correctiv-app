<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<!--
  DiscoverScreen — the Entdecken tab. Data-driven from content.js → discover.
  vm: { chips:[{label,open}], groups:[{name, items:[{name,desc,arrow,open}]}] }
-->
<div class="font-sans">
  <div class="pt-[66px] px-[16px] pb-[12px] flex flex-col gap-[12px]">
    <div class="font-bold text-[28px] text-strong">Entdecken</div>
    <div class="bg-muted rounded-[5px] h-[44px] flex items-center gap-[8px] py-[0px] px-[12px]">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#707070" stroke-width="2"><circle cx="11" cy="11" r="7"></circle><path d="M16.5 16.5L21 21"></path></svg>
      <div class="text-[15px] text-mutedfg">Recherchen, Faktenchecks, Projekte …</div>
    </div>
    <div class="flex gap-[8px] overflow-x-auto pb-[2px]">
      <sc-for list="{{ vm.chips }}" as="chip" hint-placeholder-count="5">
        <div onClick="{{ chip.open }}" class="shrink-0 border border-line2 rounded-[2px] py-[6px] px-[12px] text-[13px] font-semibold text-strong cursor-pointer">{{ chip.label }}</div>
      </sc-for>
    </div>
  </div>
  <sc-for list="{{ vm.groups }}" as="grp" hint-placeholder-count="3">
    <div class="pt-[10px] px-[16px] pb-[4px] flex flex-col">
      <div class="text-[12px] font-bold tracking-[1.2px] text-mutedfg pb-[6px]">{{ grp.name }}</div>
      <sc-for list="{{ grp.items }}" as="p" hint-placeholder-count="2">
        <div onClick="{{ p.open }}" class="flex items-center gap-[12px] py-[11px] px-[0px] border-b border-line cursor-pointer">
          <div class="flex-1 flex flex-col gap-[2px]">
            <div class="text-[15px] font-bold text-strong">{{ p.name }}</div>
            <div class="text-[13px] text-mutedfg leading-[1.4]">{{ p.desc }}</div>
          </div>
          <div class="text-[15px] text-faint shrink-0">{{ p.arrow }}</div>
        </div>
      </sc-for>
    </div>
  </sc-for>
  <div class="h-[28px]"></div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;: {&quot;width&quot;: 402, &quot;height&quot;: 760}, &quot;vm&quot;: {&quot;editor&quot;: null}}"></script>
</body>
</html>
